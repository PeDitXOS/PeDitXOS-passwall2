# Description: Auto compile with custom external files integration
# Name: "Auto compile with openwrt sdk"

name: "Auto compile with openwrt sdk"

on:
  repository_dispatch:
    types: [run]
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  TZ: Asia/Shanghai
  passwall2: PeDitXOS/PeDitXOS-passwall2
  packages: Openwrt-Passwall/openwrt-passwall-packages
  package_names: "chinadns-ng geoview hysteria naiveproxy tcping shadowsocks-rust shadowsocksr-libev simple-obfs sing-box v2ray-geodata v2ray-plugin xray-core"
  package_release: "chinadns-ng geoview hysteria naiveproxy tcping shadowsocks-rust shadowsocksr-libev simple-obfs sing-box v2ray-geoip v2ray-geosite v2ray-plugin xray-core"
  HARD_ZIP_URL: https://github.com/PeDitXOS/PeDitXOS-passwall2/raw/refs/heads/main/files/hard.zip

permissions:
  contents: write
  actions: write

jobs:
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      passwall2_version: ${{ steps.check_version.outputs.latest_version }}
      has_update: ${{ steps.check_version.outputs.has_update }}
      prerelease: ${{ steps.check_version.outputs.prerelease }}
    steps:
      - name: Checkout Upstream Repository
        uses: actions/checkout@main
        with:
          repository: Openwrt-Passwall/luci-app-passwall
          fetch-depth: 0
          ref: main

      - name: Check version
        id: check_version
        env:
          url_tags: https://api.github.com/repos/${{ env.passwall2 }}/releases/latest
        run: |
          latest_version=$(awk -F ':=' '/^PKG_VERSION:=|PKG_RELEASE:=/ {print $2}' Makefile | sed ':a;N;s/\$(PKG_VERSION)-//;s/\n$//;s/\n/-/;ba')
          echo "latest_version=${latest_version}" >> $GITHUB_OUTPUT
          
          prerelease=false
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          
          remote_latest_version=$(wget -qO- -t1 -T2 ${{env.url_tags}} | jq -r '.tag_name')
          if [ -z "$remote_latest_version" ] || [ "$remote_latest_version" = "null" ]; then
            echo "Failed to fetch remote tags from your repo, forcing update trigger."
            echo "has_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Your latest release version: $remote_latest_version"
          if [ "$latest_version" = "$remote_latest_version" ]; then
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release
        if: steps.check_version.outputs.has_update == 'true'
        run: |
          echo "## :mega:Update content" >> release.txt
          echo "![](https://img.shields.io/github/downloads/${{ env.passwall2 }}/${{steps.check_version.outputs.latest_version}}/total?style=flat-square)" >> release.txt
          echo "### Passwall2 Info" >> release.txt
          echo "**:minidisc: Passwall2 Version: ${{steps.check_version.outputs.latest_version}}**" >> release.txt
          touch release.txt

      - name: Generate new tag & release on your repository
        if: steps.check_version.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: ${{ env.passwall2 }}
          tag_name: ${{steps.check_version.outputs.latest_version}}
          prerelease: ${{steps.check_version.outputs.prerelease}}
          body_path: release.txt

  job_build_passwall2:
    name: Build passwall2 [${{ matrix.ver }}]
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ver: "ipk"
          - ver: "apk"
    steps:
      - name: Checkout Upstream Repository
        uses: actions/checkout@main
        with:
          repository: Openwrt-Passwall/luci-app-passwall
          ref: main

      - name: Install dependencies
        run: |
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Download and Integration of hard.zip (Custom Files)
        run: |
          echo "Downloading hard.zip from your repository..."
          wget -qO hard.zip "${{ env.HARD_ZIP_URL }}"
          if [ -f "hard.zip" ]; then
            echo "Extracting hard.zip contents into shahan folder..."
            mkdir -p shahan
            unzip -o hard.zip -d shahan
            echo "hard.zip integrated successfully."
          else
            echo "Error: hard.zip download failed!"
            exit 1
          fi

      - name: Initialization environment
        run: |
          url_sdk="https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          wget $url_sdk
          file_name=$(echo $url_sdk | awk -F/ '{print $NF}')
          mkdir sdk
          if [[ $file_name == *.tar.xz ]]; then
            tar -xJf $file_name -C ./sdk --strip-components=1
          elif [[ $file_name == *.tar.zst ]]; then
            tar --zstd -x -f $file_name -C ./sdk --strip-components=1
          else
            echo "Unsupported file format: $file_name"
            exit 1
          fi
          cd sdk
          sed -i \
            -e 's|git\.openwrt\.org/feed|github.com/openwrt|g' \
            -e 's|git\.openwrt\.org/project|github.com/openwrt|g' \
            -e 's|git\.openwrt\.org/openwrt|github.com/openwrt|g' \
            "feeds.conf.default"
          cat > feeds.tmp <<'EOF'
src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
src-git passwall2 https://github.com/Openwrt-Passwall/luci-app-passwall.git;main
EOF
          cat feeds.conf.default >> feeds.tmp
          mv feeds.tmp feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply patches
        run: |
          cd sdk
          rm -rf temp_resp
          git clone -b master --single-branch https://github.com/openwrt/packages.git temp_resp
          rm -rf feeds/packages/lang/golang
          cp -r temp_resp/lang/golang feeds/packages/lang
          rm -rf feeds/packages/lang/rust
          cp -r temp_resp/lang/rust feeds/packages/lang
          rm -rf temp_resp
          git clone -b main --single-branch https://github.com/openwrt/openwrt.git temp_resp
          cp -f temp_resp/scripts/patch-kernel.sh scripts/
          rm -rf temp_resp
          sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile
          grep -q -- '--ci false \\' feeds/packages/lang/rust/Makefile || sed -i '/x\.py \\/a \ --ci false \\' feeds/packages/lang/rust/Makefile
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile passwall2
        id: compile
        run: |
          cd sdk
          ver=${{ matrix.ver }}
          if [ $ver == "ipk" ]; then
            config_apk_line=$(grep -n "USE_APK" Config-build.in | awk -F ':' '{print $1}')
            [ -n "$config_apk_line" ] && sed -n $(expr ${config_apk_line} + 2)p Config-build.in | grep "default y" >/dev/null ; [ $? == 0 ] && sed -i "$(expr ${config_apk_line} + 2)s/y/n/" Config-build.in
          fi
          echo "CONFIG_ALL_NONSHARED=n" > .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          echo "CONFIG_ALL=n" >> .config
          echo "CONFIG_AUTOREMOVE=n" >> .config
          echo "CONFIG_LUCI_LANG_ru=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_LUCI_LANG_zh_Hant=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall2=m" >> .config
          make defconfig
          make package/luci-app-passwall2/{clean,compile} -j$(nproc) V=s || make package/luci-app-passwall2/{clean,compile} -j1 V=s
          mkdir upload
          mv bin/packages/*/passwall2/luci-* upload/
          make clean
          cd upload
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload passwall2 ipks to your release
        uses: softprops/action-gh-release@v3
        if: steps.compile.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: ${{ env.passwall2 }}
          tag_name: ${{needs.job_check.outputs.passwall2_version}}
          files: ${{ env.FIRMWARE }}/*

  job_auto_compile:
    name: build (${{ matrix.ver }}-${{ matrix.platform }})
    needs: job_check
    if: ${{ needs.job_check.outputs.has_update == 'true' && needs.job_check.outputs.prerelease == 'false' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            url_sdk: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            ver: "ipk"
          - platform: aarch64_generic
            url_sdk: https://downloads.openwrt.org/snapshots/targets/rockchip/armv8/openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            ver: "ipk"
          - platform: x86_64
            url_sdk: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            ver: "apk"
          - platform: aarch64_generic
            url_sdk: https://downloads.openwrt.org/snapshots/targets/rockchip/armv8/openwrt-sdk-rockchip-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst
            ver: "apk"

    steps:
      - name: Checkout Upstream Repository
        uses: actions/checkout@main
        with:
          repository: Openwrt-Passwall/luci-app-passwall
          ref: main

      - name: Initialization Environment
        run: |
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Download and Integration of hard.zip (Custom Files)
        run: |
          echo "Downloading hard.zip from your repository..."
          wget -qO hard.zip "${{ env.HARD_ZIP_URL }}"
          if [ -f "hard.zip" ]; then
            echo "Extracting hard.zip contents into shahan folder..."
            mkdir -p shahan
            unzip -o hard.zip -d shahan
            echo "hard.zip integrated successfully."
          fi

      - name: SDK download
        run: |
          wget ${{ matrix.url_sdk }}
          file_name=$(echo ${{matrix.url_sdk}} | awk -F/ '{print $NF}')
          mkdir sdk
          if [[ $file_name == *.tar.xz ]]; then
            tar -xJf $file_name -C ./sdk --strip-components=1
          elif [[ $file_name == *.tar.zst ]]; then
            tar --zstd -x -f $file_name -C ./sdk --strip-components=1
          fi

      - name: Feeds configuration
        run: |
          cd sdk
          ver=${{ matrix.ver }}
          if [ $ver == "ipk" ]; then
            config_apk_line=$(grep -n "USE_APK" Config-build.in | awk -F ':' '{print $1}')
            [ -n "$config_apk_line" ] && sed -n $(expr ${config_apk_line} + 2)p Config-build.in | grep "default y" >/dev/null ; [ $? == 0 ] && sed -i "$(expr ${config_apk_line} + 2)s/y/n/" Config-build.in
          fi
          sed -i \
            -e 's|git\.openwrt\.org/feed|github.com/openwrt|g' \
            -e 's|git\.openwrt\.org/project|github.com/openwrt|g' \
            -e 's|git\.openwrt\.org/openwrt|github.com/openwrt|g' \
            "feeds.conf.default"
          cat > feeds.tmp <<'EOF'
src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
src-git passwall2 https://github.com/Openwrt-Passwall/luci-app-passwall.git;main
EOF
          cat feeds.conf.default >> feeds.tmp
          mv feeds.tmp feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile packages
        id: compile
        run: |
          cd sdk
          for package in ${{ env.package_names }}; do
            if [ -d "feeds/passwall_packages/$package" ]; then
              make package/$package/compile -j$(nproc) V=s || make package/$package/compile -j1 V=s
            fi
          done
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize files & Zip
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd sdk
          mkdir tmp_upload
          shopt -s nullglob
          for src_dir in bin/packages/*/{packages,passwall_packages}; do
            [[ -d "$src_dir" ]] || continue
            for prefix in ${{ env.package_release }}; do
              for file in "$src_dir"/"$prefix"*; do
                [[ -f "$file" ]] || continue
                cp -r "$file" "tmp_upload/"
              done
            done
          done
          mkdir upload
          zip -jr upload/passwall_packages_${{ matrix.ver }}_${{ matrix.platform }}.zip tmp_upload/*
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to your repository release
        uses: softprops/action-gh-release@v3
        if: steps.organize.outputs.status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          repository: ${{ env.passwall2 }}
          tag_name: ${{needs.job_check.outputs.passwall2_version}}
          files: ${{ env.FIRMWARE }}/upload/*
